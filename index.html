<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎱 Multiplayer Bingo</title>
  <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #16213e; --border: #2a2a4a;
      --text: #e8e8f0; --text-muted: #8888aa; --accent: #7c3aed; --accent-hover: #6d28d9;
      --col-b: #3b82f6; --col-i: #8b5cf6; --col-n: #22c55e; --col-g: #f97316; --col-o: #ef4444;
      --col-b-dim: #1e3a5f; --col-i-dim: #3b2167; --col-n-dim: #14532d; --col-g-dim: #7c2d12; --col-o-dim: #7f1d1d;
      --free: #fbbf24; --marked: #fbbf24;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .view { display: none; width: 100%; max-width: 900px; padding: 24px 16px; }
    .view.active { display: block; }
    .header { text-align: center; padding: 32px 16px 16px; }
    .header h1 { font-size: 3rem; font-weight: 900; letter-spacing: -1px; background: linear-gradient(135deg, var(--col-b), var(--col-i), var(--col-n), var(--col-g), var(--col-o)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .header p { color: var(--text-muted); margin-top: 8px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border-radius: 10px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); }
    .btn-draw { width: 100%; padding: 18px; font-size: 1.3rem; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; border-radius: 14px; border: none; cursor: pointer; font-weight: 800; transition: all 0.2s; }
    .btn-draw:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,58,237,0.4); }
    .btn-draw:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-full { width: 100%; }
    .input { width: 100%; padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 1rem; margin-bottom: 12px; outline: none; transition: border-color 0.15s; }
    .input:focus { border-color: var(--accent); }
    .input::placeholder { color: var(--text-muted); }
    label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    #view-home { max-width: 480px; margin: 0 auto; }
    .divider { display: flex; align-items: center; gap: 12px; color: var(--text-muted); font-size: 0.85rem; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .ball { width: 100px; height: 100px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 -4px 12px rgba(0,0,0,0.3), inset 0 4px 12px rgba(255,255,255,0.2); }
    .ball.animate { animation: ballDrop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes ballDrop { 0% { transform: translateY(-60px) scale(0.5); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
    .ball-letter { font-size: 0.8rem; letter-spacing: 2px; opacity: 0.85; }
    .ball-number { font-size: 2.2rem; line-height: 1; }
    .ball-empty { width: 100px; height: 100px; border-radius: 50%; border: 3px dashed var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.85rem; }
    .ball-display { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px; }
    .ball-col-b { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #fff; }
    .ball-col-i { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: #fff; }
    .ball-col-n { background: linear-gradient(135deg, #22c55e, #15803d); color: #fff; }
    .ball-col-g { background: linear-gradient(135deg, #f97316, #c2410c); color: #fff; }
    .ball-col-o { background: linear-gradient(135deg, #ef4444, #b91c1c); color: #fff; }
    .drawn-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .drawn-col-header { font-size: 1.1rem; font-weight: 900; text-align: center; padding: 8px; border-radius: 8px; margin-bottom: 6px; }
    .drawn-col-header.B { background: var(--col-b-dim); color: var(--col-b); }
    .drawn-col-header.I { background: var(--col-i-dim); color: var(--col-i); }
    .drawn-col-header.N { background: var(--col-n-dim); color: var(--col-n); }
    .drawn-col-header.G { background: var(--col-g-dim); color: var(--col-g); }
    .drawn-col-header.O { background: var(--col-o-dim); color: var(--col-o); }
    .drawn-numbers-list { display: flex; flex-direction: column; gap: 4px; }
    .drawn-chip { text-align: center; padding: 4px 8px; border-radius: 6px; font-size: 0.9rem; font-weight: 700; }
    .drawn-chip.B { background: var(--col-b-dim); color: var(--col-b); }
    .drawn-chip.I { background: var(--col-i-dim); color: var(--col-i); }
    .drawn-chip.N { background: var(--col-n-dim); color: var(--col-n); }
    .drawn-chip.G { background: var(--col-g-dim); color: var(--col-g); }
    .drawn-chip.O { background: var(--col-o-dim); color: var(--col-o); }
    .bingo-card { border-radius: 16px; overflow: hidden; border: 2px solid var(--border); }
    .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); }
    .bingo-header-cell { padding: 12px 8px; text-align: center; font-size: 1.5rem; font-weight: 900; }
    .bingo-header-cell.B { background: var(--col-b); }
    .bingo-header-cell.I { background: var(--col-i); }
    .bingo-header-cell.N { background: var(--col-n); }
    .bingo-header-cell.G { background: var(--col-g); }
    .bingo-header-cell.O { background: var(--col-o); }
    .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); }
    .bingo-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; background: var(--surface2); border: 1px solid var(--border); cursor: default; transition: background 0.2s; }
    .bingo-cell.col-B { border-top: 2px solid var(--col-b-dim); }
    .bingo-cell.col-I { border-top: 2px solid var(--col-i-dim); }
    .bingo-cell.col-N { border-top: 2px solid var(--col-n-dim); }
    .bingo-cell.col-G { border-top: 2px solid var(--col-g-dim); }
    .bingo-cell.col-O { border-top: 2px solid var(--col-o-dim); }
    .bingo-cell.marked { background: var(--marked); color: #1a1a2e; animation: stamp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .bingo-cell.free { background: var(--free); color: #1a1a2e; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; }
    @keyframes stamp { 0% { transform: scale(1.4); } 60% { transform: scale(0.9); } 100% { transform: scale(1); } }
    .player-list { display: flex; flex-direction: column; gap: 8px; }
    .player-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); }
    .player-name { font-weight: 600; }
    .player-badge { font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
    .badge-joined { background: #14532d; color: #86efac; }
    .badge-winner { background: var(--free); color: #1a1a2e; }
    .copy-link-row { display: flex; gap: 8px; }
    .copy-link-row input { flex: 1; margin-bottom: 0; font-size: 0.85rem; }
    .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 650px) { .admin-grid { grid-template-columns: 1fr; } }
    #winner-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
    #winner-overlay.show { display: flex; }
    .winner-box { background: var(--surface); border: 2px solid var(--free); border-radius: 24px; padding: 48px; animation: winnerPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); max-width: 420px; }
    @keyframes winnerPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .winner-trophy { font-size: 5rem; display: block; }
    .winner-title { font-size: 2.5rem; font-weight: 900; color: var(--free); margin: 12px 0; }
    .winner-name { font-size: 1.5rem; color: var(--text); margin-bottom: 24px; }
    .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
    .confetti-piece { position: absolute; top: -20px; width: 10px; height: 10px; animation: confettiFall linear forwards; }
    @keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    .status-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: var(--surface2); border-radius: 8px; font-size: 0.85rem; margin-bottom: 16px; color: var(--text-muted); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--col-n); box-shadow: 0 0 6px var(--col-n); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .section-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px; }
    .error-msg { color: #f87171; font-size: 0.9rem; margin-top: 8px; min-height: 20px; }
    .numbers-remaining { text-align: center; color: var(--text-muted); font-size: 0.85rem; }
    .last-drawn-label { text-align: center; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
    .player-view-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .player-name-display { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .game-id-badge { font-size: 0.8rem; color: var(--text-muted); font-family: monospace; }
    .drawn-history-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .history-chip { padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 700; }
    .history-chip.B { background: var(--col-b-dim); color: var(--col-b); }
    .history-chip.I { background: var(--col-i-dim); color: var(--col-i); }
    .history-chip.N { background: var(--col-n-dim); color: var(--col-n); }
    .history-chip.G { background: var(--col-g-dim); color: var(--col-g); }
    .history-chip.O { background: var(--col-o-dim); color: var(--col-o); }
    hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  </style>
</head>
<body>
<div id="winner-overlay">
  <div class="confetti-container" id="confetti"></div>
  <div class="winner-box">
    <span class="winner-trophy">🏆</span>
    <div class="winner-title">BINGO!</div>
    <div class="winner-name" id="winner-name-display">Someone won!</div>
    <button class="btn btn-ghost" onclick="closeWinner()">Close</button>
  </div>
</div>
<div class="header"><h1>🎱 BINGO</h1><p>Multiplayer real-time bingo — up to 10 players</p></div>
<div id="view-home" class="view active">
  <div class="card">
    <button class="btn btn-primary btn-full" style="font-size:1.1rem;padding:16px;" onclick="createGame()">🎮 Create New Game</button>
    <p id="create-error" class="error-msg"></p>
  </div>
  <div class="divider">or join an existing game</div>
  <div class="card">
    <label for="join-game-id">Game ID</label>
    <input class="input" id="join-game-id" type="text" placeholder="e.g. ABC123" maxlength="8" />
    <label for="join-name">Your Name</label>
    <input class="input" id="join-name" type="text" placeholder="Enter your name" maxlength="30" />
    <button class="btn btn-ghost btn-full" onclick="joinGame()">Join Game →</button>
    <p id="join-error" class="error-msg"></p>
  </div>
</div>
<div id="view-admin" class="view">
  <div class="status-bar">
    <div style="display:flex;align-items:center;gap:8px;"><div class="status-dot"></div><span>Live</span></div>
    <span id="admin-game-id-label">Game: —</span>
    <button class="btn btn-ghost" style="padding:6px 12px;font-size:0.8rem;" onclick="resetToHome()">Leave</button>
  </div>
  <div class="card">
    <div class="ball-display">
      <div class="last-drawn-label">Last Drawn</div>
      <div id="admin-ball-container"><div class="ball-empty">No draw yet</div></div>
    </div>
    <button class="btn-draw" id="draw-btn" onclick="drawNumber()">🎱 Draw Number</button>
    <p class="numbers-remaining" id="admin-numbers-remaining" style="margin-top:12px;"></p>
    <p id="draw-error" class="error-msg" style="text-align:center;"></p>
  </div>
  <div class="admin-grid">
    <div class="card"><div class="section-title">Drawn Numbers</div><div class="drawn-board" id="admin-drawn-board"></div></div>
    <div class="card">
      <div class="section-title">Players (<span id="player-count">0</span>/10)</div>
      <div class="player-list" id="admin-player-list"></div>
      <hr />
      <div class="section-title" style="margin-top:0;">Shareable Link</div>
      <div class="copy-link-row">
        <input class="input" id="share-link-input" type="text" readonly />
        <button class="btn btn-ghost" onclick="copyShareLink()">Copy</button>
      </div>
      <hr />
      <button class="btn btn-danger btn-full" onclick="resetGame()">↺ Reset Game</button>
    </div>
  </div>
  <div class="card" style="margin-top:20px;"><div class="section-title">Draw History</div><div class="drawn-history-chips" id="admin-draw-history"></div></div>
</div>
<div id="view-player" class="view">
  <div class="status-bar">
    <div style="display:flex;align-items:center;gap:8px;"><div class="status-dot"></div><span>Connected</span></div>
    <span id="player-game-id-label">Game: —</span>
    <button class="btn btn-ghost" style="padding:6px 12px;font-size:0.8rem;" onclick="resetToHome()">Leave</button>
  </div>
  <div class="player-view-header">
    <div>
      <div class="player-name-display" id="player-name-display">Player</div>
      <div class="game-id-badge" id="player-game-id-badge">Game: —</div>
    </div>
    <div style="text-align:right;">
      <div class="last-drawn-label">Last Drawn</div>
      <div id="player-ball-container" style="margin-top:8px;"><div class="ball-empty" style="width:64px;height:64px;font-size:0.75rem;">—</div></div>
    </div>
  </div>
  <div class="card" style="padding:16px;"><div class="bingo-card" id="player-bingo-card"></div></div>
  <div class="card">
    <div class="section-title">All Drawn Numbers</div>
    <div class="drawn-history-chips" id="player-draw-history"></div>
    <p id="player-draw-history-empty" style="color:var(--text-muted);font-size:0.85rem;">No numbers drawn yet.</p>
  </div>
</div>
<script>
let state = { view:'home', gameId:null, adminKey:null, playerKey:null, playerName:null, card:null, drawnNumbers:[], winner:null, ablyChannel:null, ablyClient:null };
function getColLetter(n) { return n<=15?'B':n<=30?'I':n<=45?'N':n<=60?'G':'O'; }
function showView(name) { document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById('view-'+name).classList.add('active'); state.view=name; }
function setError(id,msg) { const el=document.getElementById(id); if(el) el.textContent=msg; }
async function apiFetch(path,options={}) {
  const res=await fetch('/api/'+path,{headers:{'Content-Type':'application/json'},...options});
  const data=await res.json();
  if(!res.ok) throw new Error(data.error||'Request failed');
  return data;
}
async function connectAbly(gameId,clientId) {
  if(state.ablyClient){state.ablyClient.close();state.ablyClient=null;}
  return new Promise((resolve,reject)=>{
    const ably=new Ably.Realtime({authUrl:`/api/ably-token?gameId=${encodeURIComponent(gameId)}&clientId=${encodeURIComponent(clientId)}`,authMethod:'GET'});
    ably.connection.on('connected',()=>{state.ablyClient=ably;const ch=ably.channels.get(`bingo-${gameId}`);state.ablyChannel=ch;resolve(ch);});
    ably.connection.on('failed',reject);
  });
}
async function createGame() {
  setError('create-error','');
  try {
    const data=await apiFetch('create-game',{method:'POST',body:JSON.stringify({})});
    window.history.pushState({},'',`/?game=${data.gameId}&admin=${data.adminKey}`);
    await enterAdminView(data.gameId,data.adminKey);
  } catch(e){setError('create-error',e.message);}
}
async function joinGame() {
  setError('join-error','');
  const gameId=document.getElementById('join-game-id').value.trim().toUpperCase();
  const playerName=document.getElementById('join-name').value.trim();
  if(!gameId) return setError('join-error','Enter a game ID.');
  if(!playerName) return setError('join-error','Enter your name.');
  window.history.pushState({},'',`/?game=${gameId}&name=${encodeURIComponent(playerName)}`);
  await enterPlayerView(gameId,playerName);
}
async function enterAdminView(gameId,adminKey) {
  state.gameId=gameId; state.adminKey=adminKey;
  document.getElementById('admin-game-id-label').textContent=`Game: ${gameId}`;
  document.getElementById('share-link-input').value=`${location.origin}/?game=${gameId}`;
  const gs=await apiFetch(`game-state?gameId=${gameId}`);
  state.drawnNumbers=gs.drawnNumbers||[]; state.winner=gs.winner;
  renderAdminDrawnBoard(); renderAdminPlayers(gs.players); updateDrawButton();
  const ch=await connectAbly(gameId,`admin-${gameId}`);
  ch.subscribe('game-update',(msg)=>{
    const d=msg.data; state.drawnNumbers=d.drawnNumbers; state.winner=d.winner;
    renderAdminDrawnBoard(); updateDrawButton(); updateAdminBall(d.number);
    if(d.winner) showWinner(d.winner.name);
    apiFetch(`game-state?gameId=${gameId}`).then(g=>renderAdminPlayers(g.players)).catch(()=>{});
  });
  showView('admin');
}
function renderAdminDrawnBoard() {
  const cols={B:[],I:[],N:[],G:[],O:[]};
  for(const n of state.drawnNumbers) cols[getColLetter(n)].push(n);
  const board=document.getElementById('admin-drawn-board'); board.innerHTML='';
  for(const l of ['B','I','N','G','O']){
    const col=document.createElement('div'); col.className='drawn-col';
    col.innerHTML=`<div class="drawn-col-header ${l}">${l}</div><div class="drawn-numbers-list">${cols[l].sort((a,b)=>a-b).map(n=>`<div class="drawn-chip ${l}">${n}</div>`).join('')||'<span style="color:var(--text-muted);font-size:0.8rem;">—</span>'}</div>`;
    board.appendChild(col);
  }
  document.getElementById('admin-draw-history').innerHTML=state.drawnNumbers.map(n=>`<span class="history-chip ${getColLetter(n)}">${getColLetter(n)}${n}</span>`).join('');
  document.getElementById('admin-numbers-remaining').textContent=`${75-state.drawnNumbers.length} numbers remaining`;
}
function renderAdminPlayers(players) {
  const list=document.getElementById('admin-player-list');
  const keys=Object.keys(players||{});
  document.getElementById('player-count').textContent=keys.length;
  if(!keys.length){list.innerHTML='<p style="color:var(--text-muted);font-size:0.85rem;">No players yet. Share the link!</p>';return;}
  list.innerHTML=keys.map(k=>{const p=players[k];const w=state.winner&&state.winner.playerKey===k;return `<div class="player-item"><span class="player-name">${p.name}</span><span class="player-badge ${w?'badge-winner':'badge-joined'}">${w?'🏆 Winner':'Joined'}</span></div>`;}).join('');
}
async function drawNumber() {
  const btn=document.getElementById('draw-btn'); btn.disabled=true; setError('draw-error','');
  try{await apiFetch('draw-number',{method:'POST',body:JSON.stringify({gameId:state.gameId,adminKey:state.adminKey})});}
  catch(e){setError('draw-error',e.message);}finally{btn.disabled=false;}
}
function updateDrawButton() {
  const btn=document.getElementById('draw-btn');
  if(state.winner||state.drawnNumbers.length>=75){btn.disabled=true;btn.textContent=state.winner?'🏆 Game Over':'✅ All Numbers Drawn';}
  else{btn.disabled=false;btn.textContent='🎱 Draw Number';}
}
function updateAdminBall(n) {
  if(!n) return; const l=getColLetter(n);
  const ball=document.createElement('div'); ball.className=`ball ball-col-${l.toLowerCase()} animate`;
  ball.innerHTML=`<span class="ball-letter">${l}</span><span class="ball-number">${n}</span>`;
  const c=document.getElementById('admin-ball-container'); c.innerHTML=''; c.appendChild(ball);
}
function copyShareLink(){const i=document.getElementById('share-link-input');i.select();navigator.clipboard.writeText(i.value).catch(()=>{});}
async function resetGame(){
  if(!confirm('Reset this game?')) return;
  try{const d=await apiFetch('create-game',{method:'POST',body:JSON.stringify({})});
    window.history.pushState({},'',`/?game=${d.gameId}&admin=${d.adminKey}`);
    if(state.ablyClient){state.ablyClient.close();state.ablyClient=null;}
    state.drawnNumbers=[];state.winner=null;await enterAdminView(d.gameId,d.adminKey);
  }catch(e){alert('Failed to reset: '+e.message);}
}
async function enterPlayerView(gameId,playerName){
  setError('join-error','');
  try{
    const data=await apiFetch('join-game',{method:'POST',body:JSON.stringify({gameId,playerName})});
    state.gameId=gameId;state.playerName=playerName;state.playerKey=data.playerKey;
    state.card=data.card;state.drawnNumbers=data.drawnNumbers||[];state.winner=data.winner;
    document.getElementById('player-name-display').textContent=playerName;
    document.getElementById('player-game-id-badge').textContent=`Game: ${gameId}`;
    document.getElementById('player-game-id-label').textContent=`Game: ${gameId}`;
    renderPlayerCard();renderPlayerHistory();
    const ch=await connectAbly(gameId,`player-${data.playerKey}`);
    ch.subscribe('game-update',(msg)=>{
      const d=msg.data;state.drawnNumbers=d.drawnNumbers;state.winner=d.winner;
      updatePlayerBall(d.number);markCells(d.drawnNumbers);renderPlayerHistory();
      if(d.winner)showWinner(d.winner.name);
    });
    if(state.winner)showWinner(state.winner.name);
    showView('player');
  }catch(e){setError('join-error',e.message);}
}
function renderPlayerCard(){
  const cols=['B','I','N','G','O'];
  let html='<div class="bingo-header">'+cols.map(c=>`<div class="bingo-header-cell ${c}">${c}</div>`).join('')+'</div><div class="bingo-grid">';
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){
    const v=state.card[r][c],f=v==='FREE',m=f||state.drawnNumbers.includes(v);
    html+=`<div class="bingo-cell col-${cols[c]}${f?' free':''}${m&&!f?' marked':''}" data-row="${r}" data-col="${c}">${v}</div>`;
  }
  html+='</div>';document.getElementById('player-bingo-card').innerHTML=html;
}
function markCells(drawnNumbers){
  const s=new Set(drawnNumbers);
  document.querySelectorAll('.bingo-cell').forEach(cell=>{
    if(cell.textContent==='FREE')return;
    if(s.has(parseInt(cell.textContent,10))&&!cell.classList.contains('marked')){
      cell.classList.add('marked');cell.style.animation='none';void cell.offsetWidth;cell.style.animation='';
    }
  });
}
function updatePlayerBall(n){
  if(!n)return;const l=getColLetter(n);
  const ball=document.createElement('div');ball.className=`ball ball-col-${l.toLowerCase()} animate`;
  ball.style.width='64px';ball.style.height='64px';
  ball.innerHTML=`<span class="ball-letter" style="font-size:0.6rem;">${l}</span><span class="ball-number" style="font-size:1.4rem;">${n}</span>`;
  const c=document.getElementById('player-ball-container');c.innerHTML='';c.appendChild(ball);
}
function renderPlayerHistory(){
  const c=document.getElementById('player-draw-history'),e=document.getElementById('player-draw-history-empty');
  if(!state.drawnNumbers.length){e.style.display='block';c.innerHTML='';return;}
  e.style.display='none';c.innerHTML=state.drawnNumbers.map(n=>`<span class="history-chip ${getColLetter(n)}">${getColLetter(n)}${n}</span>`).join('');
}
function showWinner(name){document.getElementById('winner-name-display').textContent=name+' wins!';document.getElementById('winner-overlay').classList.add('show');spawnConfetti();}
function closeWinner(){document.getElementById('winner-overlay').classList.remove('show');}
function spawnConfetti(){
  const c=document.getElementById('confetti');c.innerHTML='';
  const colors=['#3b82f6','#8b5cf6','#22c55e','#f97316','#ef4444','#fbbf24','#fff'];
  for(let i=0;i<80;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'vw';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.width=(Math.random()*10+6)+'px';el.style.height=(Math.random()*10+6)+'px';el.style.borderRadius=Math.random()>.5?'50%':'0';el.style.animationDuration=(Math.random()*2+2)+'s';el.style.animationDelay=(Math.random()*1.5)+'s';c.appendChild(el);}
}
function resetToHome(){
  if(state.ablyClient){state.ablyClient.close();state.ablyClient=null;}
  state={view:'home',gameId:null,adminKey:null,playerKey:null,playerName:null,card:null,drawnNumbers:[],winner:null,ablyChannel:null,ablyClient:null};
  window.history.pushState({},'','/');showView('home');
}
(function init(){
  const p=new URLSearchParams(window.location.search);
  const gameId=p.get('game'),adminKey=p.get('admin'),playerName=p.get('name');
  if(gameId&&adminKey)enterAdminView(gameId,adminKey);
  else if(gameId&&playerName){document.getElementById('join-game-id').value=gameId;document.getElementById('join-name').value=playerName;enterPlayerView(gameId,playerName);}
  else showView('home');
})();
</script>
</body>
</html>
